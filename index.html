<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Saira's Kitchen Corner</title>
    <script>
      // Pre-React interception
      window.__menuRedirect = true;
      
      // Intercept fetch/XHR to prevent React navigation
      const originalFetch = window.fetch;
      window.fetch = function(...args) {
        if (args[0] && args[0].includes('/menu')) {
          window.location.href = '/weekly-menu.html';
          return Promise.reject('Redirected to weekly menu');
        }
        return originalFetch.apply(this, args);
      };
    </script>
    <script type="module" crossorigin src="/assets/index-D9JOW-p7.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-BtkhrQJs.css">
    <style>
      /* Hide Today's Special references */
      a[href*="special"], button:contains("Special"), div:contains("Special") { display: none !important; }
      .deadline-banner {
        background-color: #fef3c7;
        color: #92400e;
        padding: 1rem;
        text-align: center;
        font-weight: bold;
        border-bottom: 1px solid #fde68a;
        position: sticky;
        top: 0;
        z-index: 1000;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Post-React interception with aggressive approach
      const redirectToMenu = () => {
        const menuLinks = Array.from(document.querySelectorAll('a')).filter(a => a.textContent.trim() === 'Menu');
        menuLinks.forEach(link => {
          link.href = '/weekly-menu.html';
          link.onclick = (e) => {
            e.preventDefault();
            e.stopPropagation();
            e.stopImmediatePropagation();
            window.location.href = '/weekly-menu.html';
            return false;
          };
          // Remove all event listeners
          const newLink = link.cloneNode(true);
          newLink.onclick = (e) => {
            e.preventDefault();
            window.location.href = '/weekly-menu.html';
            return false;
          };
          link.parentNode.replaceChild(newLink, link);
        });
      };
      
      // Try immediately
      redirectToMenu();
      
      // Try after delays
      setTimeout(redirectToMenu, 100);
      setTimeout(redirectToMenu, 300);
      setTimeout(redirectToMenu, 500);
      setTimeout(redirectToMenu, 1000);
      setTimeout(redirectToMenu, 2000);
      setTimeout(redirectToMenu, 3000);
      
      // Monitor for changes
      const observer = new MutationObserver(() => {
        redirectToMenu();
      });
      observer.observe(document.body, { childList: true, subtree: true, attributes: true });
      
      // Intercept history changes
      const originalPushState = history.pushState;
      history.pushState = function(state, title, url) {
        if (url && url.includes('/menu')) {
          window.location.href = '/weekly-menu.html';
          return;
        }
        return originalPushState.apply(history, arguments);
      };
    </script>
  </body>
</html>
