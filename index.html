<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Saira's Kitchen Corner</title>
    <script type="module" crossorigin src="/assets/index-D9JOW-p8.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-BtkhrQJs.css">
    <style>
      /* Hide Today's Special references */
      a[href*="special"], button:contains("Special"), div:contains("Special") { display: none !important; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Aggressive Menu button redirect using continuous monitoring
      let menuInterceptor = setInterval(() => {
        try {
          // Find all elements with "Menu" text
          const allElements = document.querySelectorAll('*');
          allElements.forEach(el => {
            // Check if this element contains "Menu" text and is clickable
            if ((el.tagName === 'A' || el.tagName === 'BUTTON') && 
                el.textContent.trim() === 'Menu' && 
                el.offsetParent !== null) { // visible element
              
              // Replace with link
              if (el.tagName === 'BUTTON') {
                const newLink = document.createElement('a');
                newLink.href = '/weekly-menu.html';
                newLink.textContent = el.textContent;
                newLink.className = el.className;
                newLink.style.cssText = el.style.cssText;
                el.parentNode.replaceChild(newLink, el);
              } else if (el.tagName === 'A') {
                // Ensure href is set correctly
                el.href = '/weekly-menu.html';
                el.onclick = null;
              }
            }
          });
        } catch (e) {
          // Silently fail
        }
      }, 100);

      // Also intercept any navigation attempts to /menu
      const originalPushState = history.pushState;
      const originalReplaceState = history.replaceState;
      
      history.pushState = function(state, title, url) {
        if (url && url.includes('/menu')) {
          window.location.href = '/weekly-menu.html';
          return;
        }
        return originalPushState.apply(history, arguments);
      };
      
      history.replaceState = function(state, title, url) {
        if (url && url.includes('/menu')) {
          window.location.href = '/weekly-menu.html';
          return;
        }
        return originalReplaceState.apply(history, arguments);
      };

      // Intercept all link clicks
      document.addEventListener('click', (e) => {
        if ((e.target.tagName === 'A' || e.target.tagName === 'BUTTON') &&
            e.target.textContent.trim() === 'Menu') {
          e.preventDefault();
          e.stopPropagation();
          e.stopImmediatePropagation();
          window.location.href = '/weekly-menu.html';
          return false;
        }
      }, true);

      // Stop the interceptor after 10 seconds to avoid performance issues
      setTimeout(() => {
        clearInterval(menuInterceptor);
      }, 10000);
    </script>
  </body>
</html>
