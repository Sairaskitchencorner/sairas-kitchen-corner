<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Saira's Kitchen Corner</title>
    <script type="module" crossorigin src="/assets/index-D9JOW-p7.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-BtkhrQJs.css">
    <style>
      /* Hide Today's Special references */
      a[href*="special"], button:contains("Special"), div:contains("Special") { display: none !important; }
      .deadline-banner {
        background-color: #fef3c7;
        color: #92400e;
        padding: 1rem;
        text-align: center;
        font-weight: bold;
        border-bottom: 1px solid #fde68a;
        position: sticky;
        top: 0;
        z-index: 1000;
      }
    </style>
  </head>
  <body>
    <div id="deadline-message" class="deadline-banner" style="display:none;">
      Missed your order deadline? Just text/call us and we will try our best to accommodate you😊
    </div>
    <div id="root"></div>
    <script>
      // Intercept navigation to /menu and redirect to /weekly-menu.html
      const originalPushState = history.pushState;
      const originalReplaceState = history.replaceState;
      
      history.pushState = function(state, title, url) {
        if (url && url.includes('/menu')) {
          window.location.href = '/weekly-menu.html';
          return;
        }
        return originalPushState.apply(this, arguments);
      };
      
      history.replaceState = function(state, title, url) {
        if (url && url.includes('/menu')) {
          window.location.href = '/weekly-menu.html';
          return;
        }
        return originalReplaceState.apply(this, arguments);
      };
      
      // Also intercept link clicks
      document.addEventListener('click', function(e) {
        const target = e.target.closest('a, button');
        if (target) {
          const href = target.getAttribute('href');
          if (href === '/menu' || (target.textContent && target.textContent.trim() === 'Menu')) {
            e.preventDefault();
            e.stopPropagation();
            window.location.href = '/weekly-menu.html';
          }
        }
      }, true);
      
      // Show deadline message only on menu page
      function checkRoute() {
        const banner = document.getElementById('deadline-message');
        if (window.location.pathname === '/menu' || window.location.pathname === '/weekly-menu.html') {
          banner.style.display = 'block';
        } else {
          banner.style.display = 'none';
        }
      }
      
      // Initial check
      checkRoute();
      
      // Listen for route changes (React Router)
      window.addEventListener('popstate', checkRoute);
    </script>
  </body>
</html>
