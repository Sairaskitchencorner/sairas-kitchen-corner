<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Saira's Kitchen Corner</title>
    <script type="module" crossorigin src="/assets/index-D9JOW-p7.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-BtkhrQJs.css">
    <style>
      /* Hide Today's Special references */
      a[href*="special"], button:contains("Special"), div:contains("Special") { display: none !important; }
      .deadline-banner {
        background-color: #fef3c7;
        color: #92400e;
        padding: 1rem;
        text-align: center;
        font-weight: bold;
        border-bottom: 1px solid #fde68a;
        position: sticky;
        top: 0;
        z-index: 1000;
      }
    </style>
  </head>
  <body>
    <div id="deadline-message" class="deadline-banner" style="display:none;">
      Missed your order deadline? Just text/call us and we will try our best to accommodate you😊
    </div>
    <div id="root"></div>
    <script>
      // Intercept all link clicks globally
      document.addEventListener('click', (e) => {
        const target = e.target.closest('a');
        if (target) {
          const href = target.getAttribute('href');
          if (href === '/weekly-menu.html') {
            e.preventDefault();
            e.stopPropagation();
            window.location.href = '/weekly-menu.html';
            return false;
          }
        }
      }, true);
      
      // Also replace Menu link with direct navigation
      const replaceMenuLink = () => {
        const links = document.querySelectorAll('a');
        links.forEach(link => {
          if (link.textContent.trim() === 'Menu' && !link.hasAttribute('data-menu-replaced')) {
            link.setAttribute('data-menu-replaced', 'true');
            link.setAttribute('href', '/weekly-menu.html');
            link.onclick = (e) => {
              e.preventDefault();
              e.stopPropagation();
              window.location.href = '/weekly-menu.html';
              return false;
            };
          }
        });
      };
      
      // Try multiple times
      setTimeout(replaceMenuLink, 50);
      setTimeout(replaceMenuLink, 200);
      setTimeout(replaceMenuLink, 500);
      setTimeout(replaceMenuLink, 1000);
      setTimeout(replaceMenuLink, 2000);
      
      // Monitor for DOM changes
      const observer = new MutationObserver(replaceMenuLink);
      observer.observe(document.body, { childList: true, subtree: true });
      
      // Show deadline message
      function checkRoute() {
        const banner = document.getElementById('deadline-message');
        if (window.location.pathname === '/menu' || window.location.pathname === '/weekly-menu.html') {
          banner.style.display = 'block';
        } else {
          banner.style.display = 'none';
        }
      }
      
      checkRoute();
      window.addEventListener('popstate', checkRoute);
    </script>
  </body>
</html>
